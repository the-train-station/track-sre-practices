name: free-only

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject premium tier in lesson frontmatter
        run: |
          failed=0
          while IFS= read -r -d '' readme; do
            if awk '/^---$/{f=!f;next} f && /^tier:/{print FILENAME": "$0}' "$readme"                | grep -qi 'premium'; then
              echo "ERROR: premium tier detected in $readme"
              failed=1
            fi
          done < <(find . -path './lesson-*/README.md' -print0)
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more lesson-*/README.md files contain tier: premium."
            exit 1
          fi

      - name: Reject PREMIUM sentinel comment
        run: |
          if grep -rn '<!-- PREMIUM -->' --include='*.md' --include='*.yaml' --include='*.yml' .; then
            echo "::error::The sentinel <!-- PREMIUM --> was found in this repo."
            exit 1
          fi
