name: free-only

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject premium tier in lesson frontmatter
        run: |
          failed=0
          for readme in lesson-*/README.md; do
            [ -e "$readme" ] || continue
            tier=$(grep -m1 '^tier:' "$readme" | tr -d '[:space:]' | cut -d: -f2)
            if [ "$tier" = "premium" ]; then
              echo "ERROR: premium tier detected in $readme"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more lesson-*/README.md files contain tier: premium."
            exit 1
          fi

      - name: Reject PREMIUM sentinel comment
        run: |
          # Scan published content only. Exclude .github so this workflow
          # (which necessarily contains the literal sentinel) never self-matches.
          if grep -rn '<!-- PREMIUM -->' --include='*.md' --include='*.yaml' --exclude-dir='.github' .; then
            echo "::error::The sentinel <!-- PREMIUM --> was found in this repo."
            exit 1
          fi
